{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Novo Exercício{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">

    <label for="name">Nome do exercício</label>
    <input
        name="name"
        id="name"
        required>

    <label for="muscle_group">Grupo muscular</label>

    <select
        name="muscle_group"
        id="muscle_group"
        required>

        <option value="">Selecione...</option>
        <option value="Peito">Peito</option>
        <option value="Costas">Costas</option>
        <option value="Ombros">Ombros</option>
        <option value="Bíceps">Bíceps</option>
        <option value="Tríceps">Tríceps</option>
        <option value="Pernas">Pernas</option>
        <option value="Abdômen">Abdômen</option>

    </select>

    <label for="sets">Séries</label>
    <input
        type="number"
        name="sets"
        id="sets"
        min="1"
        required>

    <label for="reps">Repetições</label>
    <input
        type="number"
        name="reps"
        id="reps"
        min="1"
        required>

    <label for="weight">Carga (kg)</label>
    <input
        type="number"
        id="weight"
        name="weight"
        min="0"
        step="0.5"
        placeholder="Ex.: 40"
        required>

    <label for="notes">Observações</label>

    <textarea
        id="notes"
        name="notes"
        rows="4"
        placeholder="Ex.: aumentar a carga na próxima semana"></textarea>

    <input type="submit" value="Salvar">

</form>
{% endblock %}
