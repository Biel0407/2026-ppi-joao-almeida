{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Novo Exercício{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">

  <label for="name">Nome do exercício</label>
  <input name="name" id="name" required>

  <label for="muscle_group">Grupo muscular</label>
  <input name="muscle_group" id="muscle_group" required>

  <label for="sets">Séries</label>
  <input type="number" name="sets" id="sets" required>

  <label for="reps">Repetições</label>
  <input type="number" name="reps" id="reps" required>

  <label for="weight">Carga (kg)</label>
  <input type="number" step="0.1" name="weight" id="weight" required>

  <input type="submit" value="Salvar">

</form>
{% endblock %}
