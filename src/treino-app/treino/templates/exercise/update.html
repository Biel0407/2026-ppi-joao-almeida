{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Editar Exercício{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">

  <label for="name">Nome do exercício</label>
  <input
      name="name"
      id="name"
      value="{{ exercise['name'] }}"
      required>

  <label for="muscle_group">Grupo muscular</label>
  <input
      name="muscle_group"
      id="muscle_group"
      value="{{ exercise['muscle_group'] }}"
      required>

  <label for="sets">Séries</label>
  <input
      type="number"
      name="sets"
      id="sets"
      value="{{ exercise['sets'] }}"
      required>

  <label for="reps">Repetições</label>
  <input
      type="number"
      name="reps"
      id="reps"
      value="{{ exercise['reps'] }}"
      required>

  <label for="weight">Carga (kg)</label>
  <input
      type="number"
      step="0.1"
      name="weight"
      id="weight"
      value="{{ exercise['weight'] }}"
      required>

  <input type="submit" value="Salvar">

</form>

<hr>

<form action="{{ url_for('exercise.delete', id=exercise['id']) }}"
      method="post">

  <input
      class="danger"
      type="submit"
      value="Excluir"
      onclick="return confirm('Deseja realmente excluir este exercício?')">

</form>

{% endblock %}
