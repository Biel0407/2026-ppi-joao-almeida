{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Editar Exercício{% endblock %}</h1>
{% endblock %}

{% block content %}

<form method="post">

    <label for="name">Nome do exercício</label>
    <input
        name="name"
        id="name"
        value="{{ exercise['name'] }}"
        required>

    <label for="muscle_group">Grupo muscular</label>

    <select
        name="muscle_group"
        id="muscle_group"
        required>

        <option value="Peito"
            {% if exercise['muscle_group'] == 'Peito' %}selected{% endif %}>
            Peito
        </option>

        <option value="Costas"
            {% if exercise['muscle_group'] == 'Costas' %}selected{% endif %}>
            Costas
        </option>

        <option value="Ombros"
            {% if exercise['muscle_group'] == 'Ombros' %}selected{% endif %}>
            Ombros
        </option>

        <option value="Bíceps"
            {% if exercise['muscle_group'] == 'Bíceps' %}selected{% endif %}>
            Bíceps
        </option>

        <option value="Tríceps"
            {% if exercise['muscle_group'] == 'Tríceps' %}selected{% endif %}>
            Tríceps
        </option>

        <option value="Pernas"
            {% if exercise['muscle_group'] == 'Pernas' %}selected{% endif %}>
            Pernas
        </option>

        <option value="Abdômen"
            {% if exercise['muscle_group'] == 'Abdômen' %}selected{% endif %}>
            Abdômen
        </option>

    </select>

    <label for="sets">Séries</label>
    <input
        type="number"
        name="sets"
        id="sets"
        min="1"
        value="{{ exercise['sets'] }}"
        required>

    <label for="reps">Repetições</label>
    <input
        type="number"
        name="reps"
        id="reps"
        min="1"
        value="{{ exercise['reps'] }}"
        required>

    <label for="weight">Carga (kg)</label>
    <input
        type="number"
        id="weight"
        name="weight"
        min="0"
        step="0.5"
        value="{{ exercise['weight'] }}"
        required>

    <label for="notes">Observações</label>

    <textarea
        id="notes"
        name="notes"
        rows="4"
        placeholder="Ex.: aumentar a carga na próxima semana">{{ exercise['notes'] }}</textarea>

    <input type="submit" value="Salvar">

</form>

<hr>

<form
    action="{{ url_for('exercise.delete', id=exercise['id']) }}"
    method="post">

    <input
        class="danger"
        type="submit"
        value="Excluir"
        onclick="return confirm('Deseja realmente excluir este exercício?')">

</form>

{% endblock %}
